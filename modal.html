<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدورات</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous">
    
    <!-- Flowbite CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/1.6.5/flowbite.min.css" rel="stylesheet">
    
    <!-- Vanilla Calendar CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vanilla-calendar@1.0.0/dist/vanilla-calendar.min.css">
    
    <!-- Link to Custom CSS File -->
    <link rel="stylesheet" href="assets/css/style.css">
    
    <!-- Flowbite JS -->
    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>
    

</head>

<body>
    <!--====================== HEADER ======================-->
    <header>
        <nav class="bg-white shadow-[0px_15px_8.5px_0px_rgba(0,0,0,0.03)]">
            <div class="max-w-[1400px] flex flex-wrap items-center justify-between mx-auto p-4">
                <a href="#" class="flex items-center space-x-3 rtl:space-x-reverse">
                    <img src="assets/images/logo.svg" class="sm:h-10 h-9" alt="Logo" />
                </a>
                <!-- قائمة التنقل -->
                <div class="items-center justify-between hidden w-full lg:flex lg:w-auto lg:order-1">
                    <ul class="flex flex-col sm:gap-[60px] gap-4 font-medium p-4 lg:p-0 mt-4 rounded-lg rtl:space-x-reverse lg:flex-row lg:mt-0 lg:border-0 lg:bg-white">
                        <li>
                            <a href="#" class="block py-2 rounded lg:bg-transparent nav-li-active" aria-current="page">الرئيسية</a>
                        </li>
                        <li>
                            <a href="#" class="block py-2 rounded hover:bg-gray-100 lg:hover:bg-transparent nav-li">إحجز إستشارتك</a>
                        </li>
                        <li>
                            <a href="#" class="block py-2 rounded hover:bg-gray-100 lg:hover:bg-transparent nav-li">الدورات</a>
                        </li>
                        <li>
                            <a href="#" class="block py-2 rounded hover:bg-gray-100 lg:hover:bg-transparent nav-li">فريقنا</a>
                        </li>
                        <li>
                            <a href="#" class="block py-2 rounded hover:bg-gray-100 lg:hover:bg-transparent nav-li">اختبارات شخصية</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    

    <!--====================== MAIN CONTENT ======================-->
    <main class="max-w-[840px] mx-auto p-4">
<!-- Modal toggle -->
<div class="flex justify-center m-5">
    <button id="updateProductButton" data-modal-target="updateProductModal" data-modal-toggle="updateProductModal" class="block text-white bg-[#E77E5C] hover:bg-primary-800 focus:ring-4 focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center" type="button">
    Update product
    </button>
</div>

<!-- Main modal -->
<div id="updateProductModal" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-modal md:h-full">
    <div class="relative p-4 w-full max-w-xl h-full md:h-auto">
        <!-- Modal content -->
        <div class="relative p-4 bg-white rounded-lg shadow sm:p-5">
            <!-- Modal header -->
            <div class="flex justify-center items-center pb-4 mb-4 rounded-t border-b sm:mb-5">
                <h3 class="text-lg  text-[#6A6565]">
                    تأكيد حذف الحساب
                </h3>
               
            </div>
            
            <!-- Modal body -->
            <form action="#">
                <div class="grid gap-4 mb-4 sm:grid-cols-1">
                    <div class="relative w-full mb-4 max-w-sm mx-auto my-5">
                        <label for="password"
                            class="block mb-[10px] mr-3 sm:mr-5  text-[16px]  font-medium text-[#2A2A2A] text-right">كلمة
                            المرور</label>

                        <div class="absolute  top-12 right-2 flex items-center pr-3 pointer-events-none">
                            <svg xmlns="http://www.w3.org/2000/svg"
                                class="sm:w-[24px] sm:h-[24px] w-[20px] h-[20px] " viewBox="0 0 23 27" fill="none">
                                <path
                                    d="M20.602 12.1062H19.4026V8.50829C19.4026 4.32066 15.9946 0.912598 11.8069 0.912598C7.61931 0.912598 4.21124 4.32066 4.21124 8.50829V12.1062H3.01192C1.68767 12.1062 0.613281 13.1806 0.613281 14.5049V24.0994C0.613281 25.4237 1.68767 26.4981 3.01192 26.4981H20.602C21.9262 26.4981 23.0006 25.4237 23.0006 24.0994V14.5049C23.0006 13.1806 21.9262 12.1062 20.602 12.1062ZM15.4049 12.1062H8.20898V8.50829C8.20898 6.52441 9.82306 4.91033 11.8069 4.91033C13.7908 4.91033 15.4049 6.52441 15.4049 8.50829V12.1062Z"
                                    fill="#D6D3D3" />
                            </svg>
                        </div>

                        <input type="password" id="password"
                            class="bg-white border pr-14 border-[#2A2A2A] rounded-[27px] w-full h-[50px] text-[#2A2A2A] text-right font-Questv1 sm:placeholder:text-[17px] placeholder:text-[15px] sm:text-[18px] text-[15px] placeholder:opacity-50"
                            placeholder="أدخل كلمة المرور" required />

                        <button type="button" id="togglePassword"
                            class="absolute top-10 left-5 flex items-center cursor-pointer">
                            <i id="eyeIcon" class="sm:text-[28px] text-[25px] bi bi-eye "></i>
                        </button>
                    </div>

                </div>
                <div class="flex items-center justify-between space-x-4 max-w-sm w-full mx-auto mt-10" >
                    <button type="submit" class="text-white bg-[#E77E5C] hover:bg-primary-800 focus:ring-4  focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-md px-10 py-2.5 text-center">
                        حذف
                    </button>
                    <button data-modal-toggle="updateProductModal" type="button" class="text-gray-900 inline-flex items-center border bg-gray-50 border-gray-400 focus:ring-4 focus:outline-none focus:ring-red-300 font-medium rounded-lg text-md px-10 py-2.5 text-center">
                        إلغاء
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

        
    </main>
</body>

</html>
